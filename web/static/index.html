<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>海克斯大乱斗 5v5 文字版</title>
<link rel="stylesheet" href="style.css?v=3">
</head>
<body class="bg-launch">
<div class="launch-screen">
  <h1 class="title-glow">海克斯大乱斗</h1>
  <h2 class="subtitle">ARAM · MAYHEM · 文字版</h2>
  <p class="version">v1.0 · 26.12</p>

  <nav class="main-menu">
    <button class="menu-btn" onclick="goStart()">▶ 开始游戏</button>
    <button class="menu-btn" onclick="openSettings()">⚙ 设置</button>
    <button class="menu-btn" onclick="openDatabase()">📚 游戏数据库</button>
    <button class="menu-btn" onclick="exitGame()">⏏ 退出游戏</button>
  </nav>

  <p class="footer-tip">选择英雄 · 推掉外塔 · 选择海克斯 · 摧毁基地</p>
</div>

<!-- 设置面板 -->
<div id="settings-modal" class="modal hidden">
  <div class="modal-content settings-content">
    <h2>⚙ 设置</h2>

    <div class="settings-section">
      <label class="settings-label">海克斯版本</label>
      <div class="version-tabs">
        <button class="version-tab" data-version="1.0" onclick="setHexVersion('1.0', this)">1.0 经典</button>
        <button class="version-tab" data-version="2.0" onclick="setHexVersion('2.0', this)">2.0 强化</button>
        <button class="version-tab" data-version="3.0" onclick="setHexVersion('3.0', this)">3.0 终极</button>
      </div>
      <p class="settings-hint" id="version-hint">选择 1.0 经典版海克斯池</p>
    </div>

    <div class="settings-footer">
      <button class="btn-primary" onclick="saveSettings()">保存</button>
      <button class="btn-secondary" onclick="closeSettings()">取消</button>
    </div>
  </div>
</div>

<!-- 游戏数据库面板 -->
<div id="db-modal" class="modal hidden">
  <div class="modal-content db-content">
    <h2>📚 游戏数据库</h2>

    <div class="db-tabs">
      <button class="db-tab active" data-tab="champions" onclick="switchDbTab('champions', this)">英雄</button>
      <button class="db-tab" data-tab="items" onclick="switchDbTab('items', this)">装备</button>
      <button class="db-tab" data-tab="hexes" onclick="switchDbTab('hexes', this)">海克斯</button>
    </div>

    <div class="db-search">
      <input type="text" id="db-search" placeholder="搜索..." oninput="filterDb()">
    </div>

    <div class="db-content-area" id="db-content-area">
      <p style="text-align:center;color:#888;padding:2rem">加载中...</p>
    </div>

    <div class="settings-footer">
      <button class="btn-secondary" onclick="closeDatabase()">关闭</button>
    </div>
  </div>
</div>

<script>
const SETTINGS_KEY = 'hexlolfun_settings';

const DEFAULT_SETTINGS = {
  hexVersion: '1.0',
};

let settings = loadSettings();
let dbData = { champions: null, items: null, hexes: null };
let currentDbTab = 'champions';

function loadSettings() {
  try {
    return Object.assign({}, DEFAULT_SETTINGS, JSON.parse(localStorage.getItem(SETTINGS_KEY) || '{}'));
  } catch (e) {
    return { ...DEFAULT_SETTINGS };
  }
}

function saveSettingsToStorage(s) {
  localStorage.setItem(SETTINGS_KEY, JSON.stringify(s));
}

function applySettingsToUI() {
  document.querySelectorAll('.version-tab').forEach(b => {
    b.classList.toggle('active', b.dataset.version === settings.hexVersion);
  });
  updateVersionHint();
}

function updateVersionHint() {
  const hints = {
    '1.0': '1.0 经典版：原始海克斯池',
    '2.0': '2.0 强化版：更多棱彩级海克斯',
    '3.0': '3.0 终极版：满级海克斯获得双倍效果',
  };
  document.getElementById('version-hint').textContent = hints[settings.hexVersion] || '';
}

function setHexVersion(v, btn) {
  settings.hexVersion = v;
  document.querySelectorAll('.version-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  updateVersionHint();
}

function openSettings() {
  applySettingsToUI();
  document.getElementById('settings-modal').classList.remove('hidden');
}

function closeSettings() {
  document.getElementById('settings-modal').classList.add('hidden');
}

function saveSettings() {
  saveSettingsToStorage(settings);
  closeSettings();
}

async function openDatabase() {
  document.getElementById('db-modal').classList.remove('hidden');
  await loadDbIfNeeded();
  renderDb();
}

function closeDatabase() {
  document.getElementById('db-modal').classList.add('hidden');
}

async function switchDbTab(tab, btn) {
  currentDbTab = tab;
  document.querySelectorAll('.db-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.getElementById('db-search').value = '';
  await loadDbIfNeeded();
  renderDb();
}

async function loadDbIfNeeded() {
  if (currentDbTab === 'champions' && !dbData.champions) {
    const r = await fetch('data/champions.json');
    dbData.champions = await r.json();
  } else if (currentDbTab === 'items' && !dbData.items) {
    const r = await fetch('data/equipments.json');
    dbData.items = await r.json();
  } else if (currentDbTab === 'hexes' && !dbData.hexes) {
    const r = await fetch('data/hex.json');
    dbData.hexes = await r.json();
  }
}

function filterDb() { renderDb(); }

function renderDb() {
  const area = document.getElementById('db-content-area');
  const q = (document.getElementById('db-search').value || '').toLowerCase();
  if (currentDbTab === 'champions') {
    const list = (dbData.champions || []).filter(c => !q || c.name.toLowerCase().includes(q) || c.id.toLowerCase().includes(q));
    area.innerHTML = `<div class="db-grid">${list.slice(0, 200).map(c => `
      <div class="db-card">
        <img class="db-icon" src="${c.square_url}" onerror="this.style.display='none'">
        <div class="db-name">${c.name}</div>
        <div class="db-meta">${c.title}</div>
        <div class="db-stats">
          <span>❤️ ${c.base_hp}</span>
          <span>🗡 ${c.base_ad}</span>
          <span>🛡 ${c.base_armor}</span>
        </div>
        <div class="db-tags">${(c.tags || []).map(t => `<span class="db-tag">${t}</span>`).join('')}</div>
      </div>`).join('')}</div>`;
  } else if (currentDbTab === 'items') {
    const raw = dbData.items || {};
    const list = (raw.all || []).filter(it => !q || it[0].toLowerCase().includes(q));
    area.innerHTML = `<div class="db-list">${list.map(it => {
      const [name, price, category, stats] = it;
      return `<div class="db-list-item">
        <div class="db-list-head">
          <span class="db-name">${name}</span>
          <span class="db-price">${price}G</span>
        </div>
        <div class="db-meta">${category}</div>
        <div class="db-stats-text">${formatStats(stats || {})}</div>
      </div>`;
    }).join('')}</div>`;
  } else if (currentDbTab === 'hexes') {
    const hex = dbData.hexes || {};
    let html = '';
    for (const tier of ['棱彩', '黄金', '白银']) {
      const list = (hex[tier] || []).filter(h => !q || h.toLowerCase().includes(q));
      if (list.length) {
        html += `<div class="db-hex-section"><h3 style="color:${tier === '棱彩' ? '#d946ef' : tier === '黄金' ? '#f0b232' : '#c0c0c0'}">${tier}海克斯 (${list.length})</h3><div class="db-hex-list">${list.map(h => `<div class="db-hex">${h}</div>`).join('')}</div></div>`;
      }
    }
    area.innerHTML = html || '<p style="text-align:center;color:#888">未找到</p>';
  }
}

function formatStats(s) {
  const labels = { ad: '🗡AD', ap: '✨AP', hp: '❤️HP', armor: '🛡护甲', mr: '🔮魔抗', attack_speed: '⚡攻速', crit: '💥暴击', ms: '👟移速' };
  return Object.entries(s).map(([k, v]) => `${labels[k] || k}: +${v}`).join(' · ');
}

function goStart(mode) {
  // 模式: 'player' = 玩家参与，'spectate' = 模拟对战
  sessionStorage.setItem('hexlolfun_settings', JSON.stringify(settings));
  sessionStorage.setItem('hexlolfun_mode', mode);
  location.href = 'champselect.html?mode=' + mode;
}

function exitGame() {
  if (confirm('确定要退出游戏吗？')) {
    window.close();
    setTimeout(() => {
      if (!document.webkitHidden) {
        document.body.innerHTML = '<div style="color:#fff;text-align:center;padding-top:30vh;font-family:sans-serif"><h1>已退出</h1><p>感谢游玩《海克斯大乱斗》！</p></div>';
      }
    }, 200);
  }
}

applySettingsToUI();
</script>
</body>
</html>

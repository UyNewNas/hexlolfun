<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<title>海克斯大乱斗 - 战斗中</title>
<link rel="stylesheet" href="style.css">
</head>
<body class="bg-arena">
<div id="app">
  <!-- 顶部状态栏 -->
  <header class="topbar">
    <div class="topbar-left">
      <span class="time-display" id="game-time">00:00</span>
      <span class="round-display">第 <span id="round-num">0</span> 回合</span>
    </div>
    <div class="topbar-center">
      <span id="game-status">战斗中</span>
    </div>
    <div class="topbar-right">
      <button class="btn-mini" onclick="showHelp()">?</button>
    </div>
  </header>

  <div class="main-grid">
    <!-- 左侧：玩家+队伍状态 -->
    <aside class="left-panel">
      <div class="panel" id="player-panel"></div>
      <div class="panel" id="team-panel"></div>
    </aside>

    <!-- 中央：地图+日志 -->
    <main class="center-panel">
      <div class="map-container">
        <div class="lane-strip" id="lane-strip"></div>
        <div class="map" id="map"></div>
      </div>
      <div class="log-container">
        <h3>📋 战报</h3>
        <div class="log-list" id="log-list"></div>
      </div>
    </main>

    <!-- 右侧：操作+商店+海克斯 -->
    <aside class="right-panel">
      <div class="panel" id="action-panel">
        <h3>🎮 操作</h3>
        <div class="action-buttons">
          <button onclick="doAction('w')">前进 W</button>
          <button onclick="doAction('s')">后退 S</button>
          <button onclick="doAction('b')">回城 B</button>
          <button onclick="doAction('蹲草')">蹲草</button>
          <button onclick="doAction('待命')" class="btn-standby">待命</button>
        </div>
      </div>

      <div class="panel" id="shop-panel"></div>
      <div class="panel" id="hex-panel"></div>
    </aside>
  </div>

  <!-- 胜负弹窗 -->
  <div id="modal" class="modal hidden">
    <div class="modal-content">
      <h1 id="modal-title"></h1>
      <p id="modal-desc"></p>
      <a class="btn-primary" href="index.html">返回主菜单</a>
    </div>
  </div>
</div>

<script src="game-core.js?v=8"></script>
<script src="game.js?v=8"></script>
</body>
</html>
